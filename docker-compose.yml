version: '3.8'

services:
  scheduler-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bus-charging-scheduler-dev
    ports:
      - "8501:8501"
    volumes:
      # Map the host project directory to /app in the container to enable hot-reloading.
      # Changes to files on your host machine will immediately reflect inside the container.
      - .:/app
      # Avoid mounting target/compiled folders back to host if you want isolated execution
      - /app/__pycache__
      - /app/src/__pycache__
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_HEADLESS=true
      # Streamlit file watcher options: 'auto', 'poll', or 'none'.
      # 'auto' is generally best. If you face issues on Mac M1/M2/M3 where changes
      # are not detected, change this value to 'poll'.
      - STREAMLIT_SERVER_FILE_WATCHER_TYPE=auto
    restart: unless-stopped
